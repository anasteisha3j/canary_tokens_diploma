<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanaryTrap - Реєстрація</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🪤 CanaryTrap</h1>
                <p>Створення нового акаунту</p>
            </div>
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">Ім'я користувача</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Наприклад: john_doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="organization">Організація *</label>
                    <input type="text" id="organization" name="organization" required
                           placeholder="Назва компанії / команди">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Мінімум 6 символів">
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Підтвердіть пароль</label>
                    <input type="password" id="confirm_password" name="confirm_password" required 
                           placeholder="Введіть пароль ще раз">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Зареєструватись</button>
            </form>
            
            <div class="auth-footer">
                <p>Вже є акаунт? <a href="{{ url_for('login') }}">Увійти</a></p>
            </div>
        </div>
    </div>

    <script>
        // Проста валідація на клієнті
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (password.length < 6) {
                e.preventDefault();
                alert('Пароль має містити мінімум 6 символів');
                return;
            }
            
            if (password !== confirm) {
                e.preventDefault();
                alert('Паролі не співпадають');
                return;
            }
        });
    </script>
</body>
</html>
